<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Horários de Ônibus</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<h1 style="text-align:center; margin-top:30px;">
Horários de Ônibus
</h1>

<div class="galeria-onibus">

{% for h in horarios %}

    {% if h.imagem %}
        <div class="item-onibus">

    <img src="{{ url_for('static', filename='uploads/' + h.imagem) }}">

</div>
    {% endif %}

{% endfor %}

</div>

</body>
</html>
