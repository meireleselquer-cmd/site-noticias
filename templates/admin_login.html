<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-box{

background:white;
padding:30px;
width:300px;
border-radius:5px;

}

input{

width:100%;
padding:10px;
margin-bottom:10px;

}

button{

width:100%;
padding:10px;
background:#1A0033;
color:white;
border:none;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Login Admin</h2>

<form method="POST">

<input type="text" name="usuario" placeholder="Usuário">

<input type="password" name="senha" placeholder="Senha">

<button>Entrar</button>

</form>

</div>

</body>

</html>
